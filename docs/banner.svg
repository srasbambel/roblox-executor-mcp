<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- True Dashboard Background (#09090b) -->
    <rect id="bg" width="1200" height="400" fill="#09090b" />

    <!-- Subtle Diagonal Stripe Pattern matching dashboard surface token -->
    <pattern id="diagonal-stripes" width="45" height="45" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <line x1="0" y1="0" x2="0" y2="45" stroke="rgba(255,255,255,0.04)" stroke-width="2" />
    </pattern>

    <!-- Ambient glow filter -->
    <filter id="light-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
    </filter>

    <!-- Grouping text to easily spawn the glow layer -->
    <g id="banner-text">
      <!-- Main text (Text Primary) -->
      <g text-anchor="middle" class="title">
        <text x="600" y="150">Roblox Executor MCP Server</text>
        <text x="600" y="215">for LLMs and AI code editors</text>
      </g>

      <!-- Subtitle text (Accent Teal) -->
      <g text-anchor="middle" class="subtitle">
        <text x="600" y="280">Get live Roblox interaction capabilities into</text>
        <text x="600" y="325">Cursor, Claude, or other LLMs</text>
      </g>
    </g>
  </defs>

  <style>
    .title {
      font-family: 'Instrument Sans', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 56px;
      fill: #fafafa;
      letter-spacing: -1.5px;
    }
    .subtitle {
      font-family: 'Instrument Sans', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 30px;
      fill: #2dd4bf; 
      letter-spacing: -0.5px;
    }
  </style>

  <!-- Solid Background -->
  <use href="#bg" />
  
  <!-- Diagonal Lines -->
  <rect width="1200" height="400" fill="url(#diagonal-stripes)" />

  <!-- Underlying Subtle Glow Layer -->
  <use href="#banner-text" filter="url(#light-glow)" opacity="0.35" />

  <!-- Foreground Sharp Text Layer -->
  <use href="#banner-text" />

</svg>
